name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'composer.json'
      - 'phpunit.xml'
      - '.github/workflows/run-tests.yml'
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'phpunit.xml'
      - '.github/workflows/run-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        testbench: ['10.*', '11.*']
        include:
          - testbench: '10.*'
            laravel: '12'
          - testbench: '11.*'
            laravel: '13'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, exif, mbstring, dom, curl, libxml, fileinfo, zip
          coverage: none

      - name: Constrain Testbench version
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: highest

      - name: Run tests
        run: composer test
