name: CSS build

on:
  push:
    branches: [main]
    paths:
      - 'resources/**'
      - 'package.json'
      - '.github/workflows/css-build.yml'
  pull_request:
    paths:
      - 'resources/**'
      - 'package.json'
      - '.github/workflows/css-build.yml'

jobs:
  build-css:
    runs-on: ubuntu-latest
    name: Build & drift check

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build stylesheet
        run: npm run build

      - name: Fail if dist/switchbot-frame.css is out of date
        run: git diff --exit-code -- dist/switchbot-frame.css
